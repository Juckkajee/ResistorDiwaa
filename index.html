<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor Challenge</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: #ff6b6b;
            font-weight: normal;
            font-size: 24px;
            margin: 5px 0 15px 0;
            text-align: center;
        }

        #game-board {
            background-color: #fce4ff;
            border: 3px dashed #666;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-info {
            width: 100%;
            display: flex;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #score-display {
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            background-color: rgba(0,0,0,0.15);
            padding: 5px 20px;
            border-radius: 8px;
        }

        /* --- ขยายรูปและปรับโครงสร้างตัวต้านทานใหม่ --- */
        .resistor-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0 25px 0; /* เพิ่มพื้นที่ด้านบนให้ตัวหนังสือ */
        }

        .wire { 
            width: 35px; 
            height: 8px; 
            background-color: #cccccc; 
            border: 1px solid #999; 
        }
        
        .resistor-body {
            width: 180px; /* ขยายให้ยาวขึ้น */
            height: 55px; /* ขยายให้อ้วนขึ้น */
            background-color: #d2691e;
            border-radius: 12px; 
            border: 2px solid #8b4513;
            display: flex; 
            justify-content: space-evenly;
            align-items: center;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2), inset 0 5px 10px rgba(255,255,255,0.2);
        }

        .band { 
            width: 16px; /* กำหนดความกว้างแถบสี */
            height: 55px; 
            position: relative; /* ล็อกตำแหน่งตัวหนังสือให้อยู่กับแถบสี */
            border-left: 1px solid rgba(0,0,0,0.3); 
            border-right: 1px solid rgba(0,0,0,0.3); 
            box-sizing: border-box;
            flex-shrink: 0; /* บังคับไม่ให้เบราว์เซอร์มือถือบีบแถบสีจนหายไป */
        }
        
        .band-label {
            position: absolute; 
            top: -26px; /* ดันข้อความขึ้นไปอยู่บนแถบสี */
            left: 50%; 
            transform: translateX(-50%); /* จัดข้อความให้อยู่กึ่งกลางแถบสีพอดี */
            font-size: 13px;
            color: #000; 
            font-weight: bold;
            white-space: nowrap; /* ไม่ให้ข้อความเด้งตกบรรทัด */
        }

        /* Display Screen */
        #display {
            width: 100%; height: 45px; background-color: white; border: 1px solid #ccc;
            border-radius: 5px; font-size: 22px; text-align: right; padding: 10px;
            box-sizing: border-box; color: #800000; margin-bottom: 15px;
            display: flex; justify-content: flex-end; align-items: center; overflow: hidden;
        }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }

        button {
            height: 50px;
            font-size: 18px; font-weight: bold;
            background-color: #eeeeee; border: 1px solid #aaa; border-radius: 8px;
            cursor: pointer; transition: background-color 0.1s; color: #333;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            padding: 0;
        }

        button:active { background-color: #cccccc; transform: scale(0.95); }
        button.action { background-color: #a9a9a9; }
        button.action:active { background-color: #808080; }
    </style>
</head>
<body>

    <h1>Resistor Challenge</h1>

    <div id="game-board">
        <div class="header-info">
            <span id="score-display">Score: 0</span>
        </div>

        <div class="resistor-wrapper">
            <div class="wire"></div>
            <div class="resistor-body">
                <div class="band" id="band1"><span class="band-label" id="label1"></span></div>
                <div class="band" id="band2"><span class="band-label" id="label2"></span></div>
                <div class="band" id="band3"><span class="band-label" id="label3"></span></div>
                <div class="band" id="band4" style="background-color: #FFD700;"><span class="band-label">Gold</span></div>
            </div>
            <div class="wire"></div>
        </div>

        <div id="display"></div>

        <div class="keypad">
            <button onclick="inputNum('7')">7</button>
            <button onclick="inputNum('8')">8</button>
            <button onclick="inputNum('9')">9</button>
            <button onclick="setUnit(1, 'Ω')">Ω</button>
            
            <button onclick="inputNum('4')">4</button>
            <button onclick="inputNum('5')">5</button>
            <button onclick="inputNum('6')">6</button>
            <button onclick="setUnit(1000, 'kΩ')">kΩ</button>
            
            <button onclick="inputNum('1')">1</button>
            <button onclick="inputNum('2')">2</button>
            <button onclick="inputNum('3')">3</button>
            <button onclick="setUnit(1000000, 'MΩ')">MΩ</button>
            
            <button onclick="clearDisplay()">C</button>
            <button onclick="inputNum('0')">0</button>
            <button onclick="inputNum('.')">.</button>
            <button class="action" onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: "Black", color: "#000000", val: 0, mult: 1 },
            { name: "Brown", color: "#8B4513", val: 1, mult: 10 },
            { name: "Red", color: "#FF0000", val: 2, mult: 100 },
            { name: "Orange", color: "#FFA500", val: 3, mult: 1000 },
            { name: "Yellow", color: "#FFFF00", val: 4, mult: 10000 },
            { name: "Green", color: "#008000", val: 5, mult: 100000 },
            { name: "Blue", color: "#0000FF", val: 6, mult: 1000000 },
            { name: "Violet", color: "#EE82EE", val: 7, mult: 10000000 },
            { name: "Gray", color: "#808080", val: 8, mult: 100000000 },
            { name: "White", color: "#FFFFFF", val: 9, mult: 1000000000 }
        ];

        let score = 0;
        let expectedOhm = 0;
        
        let currentInputStr = "";
        let currentUnitMult = null;
        let currentUnitStr = "";

        function initGame() {
            generateResistor();
            updateScore();
            clearDisplay();
        }

        function generateResistor() {
            let b1 = Math.floor(Math.random() * 9) + 1; 
            let b2 = Math.floor(Math.random() * 10);
            let b3 = Math.floor(Math.random() * 7);

            document.getElementById('band1').style.backgroundColor = colors[b1].color;
            document.getElementById('band2').style.backgroundColor = colors[b2].color;
            document.getElementById('band3').style.backgroundColor = colors[b3].color;

            document.getElementById('label1').innerText = colors[b1].name;
            document.getElementById('label2').innerText = colors[b2].name;
            document.getElementById('label3').innerText = colors[b3].name;

            expectedOhm = ((colors[b1].val * 10) + colors[b2].val) * colors[b3].mult;
        }

        function inputNum(char) {
            if (char === '.' && currentInputStr.includes('.')) return;
            currentInputStr += char;
            renderDisplay();
        }

        function setUnit(multiplier, symbol) {
            if (currentInputStr === "" && symbol !== "") return;
            currentUnitMult = multiplier;
            currentUnitStr = symbol;
            renderDisplay();
        }

        function clearDisplay() {
            currentInputStr = "";
            currentUnitMult = null;
            currentUnitStr = "";
            renderDisplay();
        }

        function renderDisplay() {
            const displayEl = document.getElementById('display');
            displayEl.innerHTML = currentInputStr + (currentUnitStr ? ` <span style="color:black; margin-left:5px;">${currentUnitStr}</span>` : "");
        }

        function checkAnswer() {
            if (currentInputStr === "" || currentUnitMult === null) {
                alert("กรุณาใส่ตัวเลขและเลือกหน่วย (Ω, kΩ, MΩ) ให้ครบถ้วน");
                return;
            }

            let userValue = parseFloat(currentInputStr) * currentUnitMult;

            if (Math.abs(userValue - expectedOhm) < 0.01) {
                score++;
                alert("ถูกต้อง! ลุยข้อต่อไปเลย");
                initGame();
            } else {
                score = 0;
                updateScore();
                
                let formattedText = "";
                if (expectedOhm >= 1000000) {
                    let val = expectedOhm / 1000000;
                    formattedText = ` หรือ ${val} MΩ`;
                } else if (expectedOhm >= 1000) {
                    let val = expectedOhm / 1000;
                    formattedText = ` หรือ ${val} kΩ`;
                }

                alert(`ผิดครับ! ค่าที่ถูกต้องคือ ${expectedOhm} Ω${formattedText}\nพยายามใหม่นะ!`);
                clearDisplay();
            }
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `Score: ${score}`;
        }

        initGame();
    </script>

</body>
</html>
