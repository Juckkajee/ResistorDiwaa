<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor Challenge</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px; /* ลดขอบนอกลงเพื่อให้มีพื้นที่เยอะขึ้น */
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #ff6b6b;
            font-weight: normal;
            font-size: 28px;
            margin: 10px 0 20px 0;
            text-align: center;
        }

        #game-board {
            background-color: #fce4ff;
            border: 3px dashed #666;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px; /* จำกัดความกว้างสูงสุด แต่ยืดหยุ่นตามจอมือถือ */
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-info {
            width: 100%;
            display: flex;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #score-display {
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            background-color: rgba(0,0,0,0.1);
            padding: 5px 15px;
            border-radius: 8px;
        }

        /* Resistor Graphic */
        .resistor-wrapper {
            position: relative;
            margin: 25px 0 30px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9); /* ย่อส่วนตัวต้านทานลงนิดนึงให้ไม่ล้นจอแนวตั้ง */
        }

        .wire {
            width: 40px;
            height: 8px;
            background-color: #cccccc;
            border: 1px solid #999;
        }

        .resistor-body {
            width: 140px;
            height: 46px;
            background-color: #d2691e;
            border-radius: 10px;
            border: 2px solid #8b4513;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 8px;
            position: relative;
        }

        .band {
            width: 12px;
            height: 46px;
            border-left: 1px solid rgba(0,0,0,0.2);
            border-right: 1px solid rgba(0,0,0,0.2);
        }

        .color-labels {
            position: absolute;
            top: -22px;
            display: flex;
            width: 140px;
            justify-content: space-around;
            padding: 0 8px;
            font-size: 11px;
            color: #000;
            font-weight: bold;
        }

        /* Display Screen */
        #display {
            width: 100%;
            height: 50px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            color: #800000;
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
        }

        /* Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
        }

        button {
            height: 55px; /* ปรับความสูงให้พอดีกับการกดด้วยนิ้วโป้ง */
            font-size: 20px;
            font-weight: bold;
            background-color: #eeeeee;
            border: 1px solid #aaa;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.1s;
            color: #333;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; /* เอาแสงกระพริบตอนกดบนมือถือออก */
        }

        button:active {
            background-color: #cccccc;
            transform: scale(0.95);
        }

        button.action {
            background-color: #a9a9a9;
        }

        button.action:active {
            background-color: #808080;
        }

        /* สำหรับมือถือจอเล็กมาก ให้ลดขนาดลงอีกนิด */
        @media (max-width: 360px) {
            h1 { font-size: 24px; }
            button { height: 50px; font-size: 18px; }
            .resistor-wrapper { transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <h1>Resistor Challenge</h1>

    <div id="game-board">
        <div class="header-info">
            <span id="score-display">Score: 0</span>
        </div>

        <div class="resistor-wrapper">
            <div class="wire"></div>
            <div class="resistor-body">
                <div class="color-labels">
                    <span id="label1"></span>
                    <span id="label2"></span>
                    <span id="label3"></span>
                </div>
                <div class="band" id="band1"></div>
                <div class="band" id="band2"></div>
                <div class="band" id="band3"></div>
                <div class="band" id="band4" style="background-color: gold; margin-left: 10px;"></div>
            </div>
            <div class="wire"></div>
        </div>

        <div id="display"></div>

        <div class="keypad">
            <button onclick="inputNum('7')">7</button>
            <button onclick="inputNum('8')">8</button>
            <button onclick="inputNum('9')">9</button>
            <button onclick="setUnit(1, 'Ω')">Ω</button>
            
            <button onclick="inputNum('4')">4</button>
            <button onclick="inputNum('5')">5</button>
            <button onclick="inputNum('6')">6</button>
            <button onclick="setUnit(1000, 'kΩ')">kΩ</button>
            
            <button onclick="inputNum('1')">1</button>
            <button onclick="inputNum('2')">2</button>
            <button onclick="inputNum('3')">3</button>
            <button onclick="setUnit(1000000, 'MΩ')">MΩ</button>
            
            <button onclick="clearDisplay()">C</button>
            <button onclick="inputNum('0')">0</button>
            <button onclick="inputNum('.')">.</button>
            <button class="action" onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: "Black", color: "#000000", val: 0, mult: 1 },
            { name: "Brown", color: "#8B4513", val: 1, mult: 10 },
            { name: "Red", color: "#FF0000", val: 2, mult: 100 },
            { name: "Orange", color: "#FFA500", val: 3, mult: 1000 },
            { name: "Yellow", color: "#FFFF00", val: 4, mult: 10000 },
            { name: "Green", color: "#008000", val: 5, mult: 100000 },
            { name: "Blue", color: "#0000FF", val: 6, mult: 1000000 },
            { name: "Violet", color: "#EE82EE", val: 7, mult: 10000000 },
            { name: "Gray", color: "#808080", val: 8, mult: 100000000 },
            { name: "White", color: "#FFFFFF", val: 9, mult: 1000000000 }
        ];

        let score = 0;
        let expectedOhm = 0;
        
        let currentInputStr = "";
        let currentUnitMult = null;
        let currentUnitStr = "";

        function initGame() {
            generateResistor();
            updateScore();
            clearDisplay();
        }

        function generateResistor() {
            let b1 = Math.floor(Math.random() * 9) + 1; 
            let b2 = Math.floor(Math.random() * 10);
            let b3 = Math.floor(Math.random() * 7);

            document.getElementById('band1').style.backgroundColor = colors[b1].color;
            document.getElementById('band2').style.backgroundColor = colors[b2].color;
            document.getElementById('band3').style.backgroundColor = colors[b3].color;

            document.getElementById('label1').innerText = colors[b1].name;
            document.getElementById('label2').innerText = colors[b2].name;
            document.getElementById('label3').innerText = colors[b3].name;

            expectedOhm = ((colors[b1].val * 10) + colors[b2].val) * colors[b3].mult;
        }

        function inputNum(char) {
            if (char === '.' && currentInputStr.includes('.')) return;
            currentInputStr += char;
            renderDisplay();
        }

        function setUnit(multiplier, symbol) {
            if (currentInputStr === "" && symbol !== "") return;
            currentUnitMult = multiplier;
            currentUnitStr = symbol;
            renderDisplay();
        }

        function clearDisplay() {
            currentInputStr = "";
            currentUnitMult = null;
            currentUnitStr = "";
            renderDisplay();
        }

        function renderDisplay() {
            const displayEl = document.getElementById('display');
            displayEl.innerHTML = currentInputStr + (currentUnitStr ? ` <span style="color:black; margin-left:5px;">${currentUnitStr}</span>` : "");
        }

        function checkAnswer() {
            if (currentInputStr === "" || currentUnitMult === null) {
                alert("กรุณาใส่ตัวเลขและเลือกหน่วย (Ω, kΩ, MΩ) ให้ครบถ้วน");
                return;
            }

            let userValue = parseFloat(currentInputStr) * currentUnitMult;

            if (Math.abs(userValue - expectedOhm) < 0.01) {
                score++;
                alert("ถูกต้อง! ลุยข้อต่อไปเลย");
                initGame();
            } else {
                score = 0;
                updateScore();
                
                let formattedText = "";
                if (expectedOhm >= 1000000) {
                    let val = expectedOhm / 1000000;
                    formattedText = ` หรือ ${val} MΩ`;
                } else if (expectedOhm >= 1000) {
                    let val = expectedOhm / 1000;
                    formattedText = ` หรือ ${val} kΩ`;
                }

                alert(`ผิดครับ! ค่าที่ถูกต้องคือ ${expectedOhm} Ω${formattedText}\nพยายามใหม่นะ!`);
                clearDisplay();
            }
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `Score: ${score}`;
        }

        initGame();
    </script>

</body>
</html>
