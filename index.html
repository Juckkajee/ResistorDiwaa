<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor Challenge</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: #ff6b6b;
            font-weight: normal;
            font-size: 24px;
            margin: 5px 0 15px 0;
            text-align: center;
        }

        #game-board {
            background-color: #fce4ff;
            border: 3px dashed #666;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-info {
            width: 100%; display: flex; justify-content: center;
            font-size: 22px; font-weight: bold; margin-bottom: 15px;
        }

        #score-display {
            color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            background-color: rgba(0,0,0,0.15); padding: 5px 20px; border-radius: 8px;
        }

        /* --- โครงสร้างตัวต้านทานแบบใหม่ (ใหญ่สะใจ ไม่มีตัวหนังสือ) --- */
        .resistor-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 35px 0;
            width: 100%;
        }

        .graphic-row {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wire { 
            width: 40px; height: 12px; /* ขยายขนาดลวด */
            background-color: #cccccc; border: 1px solid #999; 
        }
        
        .resistor-body {
            width: 220px; height: 80px; /* ขยายตัวต้านทานให้ใหญ่ขึ้นมาก */
            background-color: #d2691e;
            border-radius: 16px; border: 3px solid #8b4513;
            display: flex; justify-content: space-evenly; align-items: center;
            box-shadow: inset 0 -8px 15px rgba(0,0,0,0.2), inset 0 8px 15px rgba(255,255,255,0.2);
        }

        .band { 
            width: 22px; height: 100%; /* ขยายความกว้างแถบสี */
            border-left: 1px solid rgba(0,0,0,0.3); 
            border-right: 1px solid rgba(0,0,0,0.3); 
            box-sizing: border-box;
        }

        /* หน้าจอเครื่องคิดเลข */
        #display {
            width: 100%; height: 45px; background-color: white; border: 1px solid #ccc;
            border-radius: 5px; font-size: 22px; text-align: right; padding: 10px;
            box-sizing: border-box; color: #800000; margin-bottom: 15px;
            display: flex; justify-content: flex-end; align-items: center; overflow: hidden;
        }

        /* ปุ่มกด */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }

        button {
            height: 50px; font-size: 18px; font-weight: bold;
            background-color: #eeeeee; border: 1px solid #aaa; border-radius: 8px;
            cursor: pointer; transition: background-color 0.1s; color: #333;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent; padding: 0;
        }

        button:active { background-color: #cccccc; transform: scale(0.95); }
        button.action { background-color: #a9a9a9; }
        button.action:active { background-color: #808080; }
    </style>
</head>
<body>

        <div class="header-info">
            <span id="score-display">Score: 0</span>
        </div>

        <div class="resistor-section">
            <div class="graphic-row">
                <div class="wire"></div>
                <div class="resistor-body">
                    <div class="band" id="band1"></div>
                    <div class="band" id="band2"></div>
                    <div class="band" id="band3"></div>
                    <div class="band" id="band4" style="background-color: #FFD700;"></div>
                </div>
                <div class="wire"></div>
            </div>
        </div>

        <div id="display"></div>

            <button onclick="inputNum('8')">8</button>
            <button onclick="inputNum('9')">9</button>

            <button onclick="setUnit(1000, 'kΩ')">kΩ</button>

            <button onclick="inputNum('2')">2</button>
            <button onclick="inputNum('3')">3</button>
